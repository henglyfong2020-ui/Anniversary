<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Anniversary</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Jost:wght@300;400;500&display=swap');

  :root{
    --black: #0a0908;
    --charcoal: #1c1a17;
    --gold: #d4af37;
    --gold-light: #f2d879;
    --cream: #f5efe0;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    background: radial-gradient(ellipse at 50% 20%, #2a2620 0%, #131110 55%, #050504 100%);
    font-family:'Jost', sans-serif;
    color: var(--cream);
  }

  .stage{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
    padding: 20px;
  }

  /* --- Circular photo frame with golden stroke --- */
  .photo-frame{
    position: relative;
    width: min(55vw, 320px);
    height: min(55vw, 320px);
    border-radius: 50%;
    margin: 0 auto 8px;
    opacity: 0;
    transform: scale(0.85);
    animation: photoIn 1s ease forwards;
    animation-delay: 0.2s;
  }

  @keyframes photoIn{
    to{ opacity:1; transform: scale(1); }
  }

  .photo-frame::before{
    content:"";
    position:absolute;
    inset: -8px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--gold), var(--gold-light), var(--cream), var(--gold));
    animation: spin 6s linear infinite;
    z-index: 0;
  }

  .photo-frame::after{
    content:"";
    position:absolute;
    inset: -8px;
    border-radius: 50%;
    box-shadow: 0 0 22px 4px rgba(201,162,39,0.35);
    z-index: 0;
  }

  @keyframes spin{
    to{ transform: rotate(360deg); }
  }

  .photo-frame img{
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    border: 4px solid var(--cream);
  }

  /* --- Signature element: two interlocking rings that draw themselves --- */
  .rings{
    width: min(38vw, 200px);
    height: auto;
    filter: drop-shadow(0 0 18px rgba(201,162,39,0.25));
    margin-top: -100px;
  }

  .ring-path{
    fill:none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 300;
    stroke-dashoffset: 300;
    animation: draw 2.2s ease forwards;
  }
  .ring-a{ stroke: var(--gold); animation-delay: 0.1s; }
  .ring-b{ stroke: var(--gold-light); animation-delay: 0.5s; }

  @keyframes draw{
    to{ stroke-dashoffset: 0; }
  }

  .rings-wrap{
    opacity:0;
    transform: translateY(10px) scale(0.96);
    animation: ringsIn 1s ease forwards;
    animation-delay: 0.1s;
    margin: 0 auto;
    display:flex;
    justify-content:center;
  }
  @keyframes ringsIn{
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  .glow-pulse{
    animation: pulse 2.6s ease-in-out infinite;
    animation-delay: 2.4s;
    transform-origin: center;
  }
  @keyframes pulse{
    0%, 100%{ filter: drop-shadow(0 0 10px rgba(201,162,39,0.2)); }
    50%{ filter: drop-shadow(0 0 26px rgba(201,162,39,0.55)); }
  }

  /* --- Text reveal --- */
  h1{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size: clamp(2.2rem, 6vw, 4.2rem);
    letter-spacing: 0.01em;
    margin: 0.15em auto 0.1em;
    text-align:center;
    width: 100%;
    opacity:0;
    transform: translateY(16px);
    animation: fadeUp 1s ease forwards;
    animation-delay: 1.9s;
    background: linear-gradient(90deg, var(--gold), var(--cream) 45%, var(--gold-light));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  .subtitle{
    font-weight:300;
    font-size: clamp(0.95rem, 2vw, 1.2rem);
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--gold);
    opacity:0;
    transform: translateY(10px);
    animation: fadeUp 1s ease forwards;
    animation-delay: 2.3s;
    width: 100%;
    text-align: center;
  }

  .line{
    width:0;
    height:1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 12px auto;
    animation: growLine 1.2s ease forwards;
    animation-delay: 2.1s;
  }
  @keyframes growLine{ to{ width: 120px; } }

  @keyframes fadeUp{
    to{ opacity:1; transform: translateY(0); }
  }

  .message{
    max-width: 480px;
    text-align:center;
    font-weight:300;
    font-size: 1rem;
    line-height:1.7;
    color: rgba(250,243,238,0.85);
    opacity:0;
    transform: translateY(10px);
    animation: fadeUp 1s ease forwards;
    animation-delay: 2.6s;
    padding: 0 24px;
    margin: 0 auto;
    width: 100%;
  }

  .message em{
    font-style: italic;
    color: var(--gold);
  }

  /* --- Ambient floating petals --- */
  .petal{
    position:absolute;
    top:-5%;
    font-size: 1.1rem;
    opacity:0.85;
    pointer-events:none;
    animation-name: drift, sway;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
    will-change: transform;
  }

  @keyframes drift{
    from{ transform: translateY(-10vh); }
    to{ transform: translateY(110vh); }
  }
  @keyframes sway{
    0%, 100%{ margin-left: -30px; }
    50%{ margin-left: 30px; }
  }

  .footer-hint{
    position:absolute;
    bottom: 70px;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform:uppercase;
    color: rgba(245,239,224,0.35);
    opacity:0;
    animation: fadeUp 1s ease forwards;
    animation-delay: 3.4s;
  }

  #musicBtn{
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 10;
    background: rgba(245,239,224,0.08);
    border: 1px solid var(--gold);
    color: var(--cream);
    padding: 8px 16px;
    border-radius: 30px;
    font-family: 'Jost', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.3s ease, transform 0.2s ease;
  }
  #musicBtn:hover{
    background: rgba(212,175,55,0.2);
    transform: translateY(-1px);
  }
</style>
</head>
<body>

<audio id="bgMusic" src="Fallingforyou.mp3" loop></audio>
<button id="musicBtn" onclick="toggleMusic()">🔇 Play Music</button>

<div class="stage" id="stage">

  <div class="photo-frame">
    <img src="Photo1.jpg" alt="Our photo">
  </div>

  <div class="rings-wrap glow-pulse">
    <svg class="rings" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
      <circle class="ring-path ring-a" cx="80" cy="60" r="38" pathLength="300"/>
      <circle class="ring-path ring-b" cx="120" cy="60" r="38" pathLength="300"/>
    </svg>
  </div>

  <h1>Happy Anniversary</h1>
  <div class="subtitle">To many more years together</div>
  <div class="line"></div>

  <p class="message">
    Every year with you feels like the <em>best one yet</em>.
    Here's to the memories we've made, and all the ones still waiting for us.
  </p>

  <div class="footer-hint">made with love</div>
</div>

<script>
  const stage = document.getElementById('stage');
  const petals = ['🌸','💐','✨','🤍'];
  const count = 22;

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petals[Math.floor(Math.random() * petals.length)];
    const left = Math.random() * 100;
    const driftDuration = 9 + Math.random() * 8;
    const swayDuration = 3 + Math.random() * 3;
    const delay = Math.random() * 12;
    const size = 0.8 + Math.random() * 1.1;

    p.style.left = left + 'vw';
    p.style.fontSize = size + 'rem';
    p.style.animationDuration = driftDuration + 's, ' + swayDuration + 's';
    p.style.animationDelay = '-' + delay + 's, -' + (Math.random() * swayDuration) + 's';

    stage.appendChild(p);
  }

  function toggleMusic(){
    const music = document.getElementById('bgMusic');
    const btn = document.getElementById('musicBtn');
    if (music.paused) {
      music.play();
      btn.textContent = '🔊 Pause Music';
    } else {
      music.pause();
      btn.textContent = '🔇 Play Music';
    }
  }
</script>

</body>
</html>
